name: video-pipeline

# 触发规则、tag 格式、单次配置说明见仓库根 CLAUDE.md → 「CI / 视频流水线」。
# This workflow runs only on `v*` tag push or manual `workflow_dispatch`.
# Normal `git push` to main does NOT trigger anything.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      slug:
        description: 'video slug (must match a videos/<slug>/article.md)'
        required: true
        type: string
      theme:
        description: 'override theme id (empty = use outline recommendation)'
        required: false
        default: ''
        type: string

permissions:
  contents: write  # commit generated script.md / outline.md
  pages: write
  id-token: write

concurrency:
  group: video-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: generate script + outline
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.parse-slug.outputs.slug }}
      theme: ${{ steps.parse-theme.outputs.theme }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: parse slug from tag or input
        id: parse-slug
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLUG="${{ inputs.slug }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" != *-* ]]; then
              echo "::error::Tag must be in format v<version>-<slug>, got: $TAG"
              exit 1
            fi
            SLUG="${TAG#v*-}"
          fi
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "[parse-slug] slug=${SLUG}"

      - name: validate article exists
        env:
          SLUG: ${{ steps.parse-slug.outputs.slug }}
        run: |
          if [ ! -f "videos/${SLUG}/article.md" ]; then
            echo "::error::videos/${SLUG}/article.md not found"
            exit 1
          fi
          echo "[validate] found videos/${SLUG}/article.md"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install openai sdk
        working-directory: .github/scripts
        run: npm ci

      - name: generate script + outline
        working-directory: .github/scripts
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}
          MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL }}
          VIDEO_SLUG: ${{ steps.parse-slug.outputs.slug }}
        run: node generate-content.mjs

      - name: commit generated content
        env:
          SLUG: ${{ steps.parse-slug.outputs.slug }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "videos/${SLUG}/script.md" "videos/${SLUG}/outline.md"
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ci: generate script + outline for ${SLUG}"
            git push
          fi

      - name: extract recommended theme
        id: parse-theme
        env:
          SLUG: ${{ steps.parse-slug.outputs.slug }}
          THEME_OVERRIDE: ${{ inputs.theme }}
        run: |
          if [ -n "$THEME_OVERRIDE" ]; then
            THEME="$THEME_OVERRIDE"
            echo "[parse-theme] override: ${THEME}"
          else
            THEME=$(grep -oE 'midnight-press|paper-press|terminal-green|blueprint|chalk-garden|bauhaus-bold|sunset-zine|newsroom|monochrome-print|warm-keynote' \
              "videos/${SLUG}/outline.md" | head -n1 || true)
            if [ -z "$THEME" ]; then
              THEME="midnight-press"
              echo "[parse-theme] no theme in outline, default: ${THEME}"
            else
              echo "[parse-theme] from outline: ${THEME}"
            fi
          fi
          echo "theme=${THEME}" >> "$GITHUB_OUTPUT"

  build:
    name: scaffold + build
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clean previous presentation
        env:
          SLUG: ${{ needs.generate.outputs.slug }}
        run: rm -rf "videos/${SLUG}/presentation"

      - name: scaffold presentation project
        env:
          SLUG: ${{ needs.generate.outputs.slug }}
          THEME: ${{ needs.generate.outputs.theme }}
        run: |
          bash .claude/skills/nuo-video/scripts/scaffold.sh \
            "videos/${SLUG}/presentation" \
            --theme="${THEME}"

      - name: patch Vite base path
        env:
          SLUG: ${{ needs.generate.outputs.slug }}
        run: |
          cd "videos/${SLUG}/presentation"
          node ../../../../.github/scripts/patch-vite-base.mjs "${SLUG}"

      - name: build
        working-directory: videos/${{ needs.generate.outputs.slug }}/presentation
        run: |
          npm ci
          npm run build

      - name: prepare Pages dist
        env:
          SLUG: ${{ needs.generate.outputs.slug }}
        run: |
          mkdir -p "dist/videos/${SLUG}"
          cp -r "videos/${SLUG}/presentation/dist/." "dist/videos/${SLUG}/"
          echo "[dist] contents:"
          ls -la "dist/videos/${SLUG}/"

      - name: upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
